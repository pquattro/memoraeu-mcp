startCommand:
  type: http

configSchema:
  type: object
  required:
    - apiKey
  properties:
    apiKey:
      type: string
      description: "Your MemoraEU API key. Get it from app.memoraeu.com → Settings → API Keys."

commandFunction: |
  config => ({
    url: "https://api.memoraeu.com/mcp/sse",
    headers: {
      "Authorization": `Bearer ${config.apiKey}`
    }
  })
